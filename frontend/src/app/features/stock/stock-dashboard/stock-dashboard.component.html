<section class="stock-dashboard">
  <header class="page-header">
    <div>
      <h1>Stock Dashboard</h1>
      <p>Manage stock entries, items and item groups</p>
    </div>
  </header>

  <div class="stock-tiles">
    @for (tile of visibleTiles(); track tile.route) {
      <a class="stock-tile" [class]="'tone-' + tile.tone" [routerLink]="tile.route">
        <div class="tile-icon" [attr.data-icon]="tile.icon" aria-hidden="true"></div>
        <span class="tile-title">{{ tile.label }}</span>
        <span class="tile-desc">{{ tile.description }}</span>
      </a>
    }
  </div>
</section>
