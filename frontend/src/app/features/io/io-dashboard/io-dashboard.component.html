<section class="io-dashboard">
  <header class="page-header">
    <div>
      <h1>Inward & Outward</h1>
      <p>Manage incoming and outgoing official correspondence registers</p>
    </div>
  </header>

  <div class="io-tiles">
    @for (tile of tiles; track tile.route) {
      <a class="io-tile" [class]="'tone-' + tile.tone" [routerLink]="tile.route">
        <div class="tile-icon" [attr.data-icon]="tile.icon" aria-hidden="true"></div>
        <span class="tile-title">{{ tile.label }}</span>
        <span class="tile-desc">{{ tile.description }}</span>
      </a>
    }
  </div>
</section>
