<button
  type="button"
  class="action-btn icon-btn"
  [class.view]="action() === 'view'"
  [class.edit]="action() === 'edit'"
  [class.delete]="action() === 'delete'"
  [class.deactivate]="action() === 'deactivate'"
  [disabled]="disabled()"
  [attr.title]="tooltip()"
  [attr.aria-label]="tooltip()"
  (click)="onClick($event)"
>
  @switch (action()) {
    @case ('view') {
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    }
    @case ('edit') {
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
        <path d="M19.5 7.125L16.862 4.487M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
      </svg>
    }
    @case ('delete') {
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
      </svg>
    }
    @case ('deactivate') {
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
      </svg>
    }
  }
</button>
